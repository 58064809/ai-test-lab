tools:
  - name: memory_read
    description: Read-only access to structured memory records.
    status: enabled
    risk_level: read_only
    category: internal
    implementation: local_python
    notes: 当前只用于读取 memory，不包含长期记忆写入能力。

  - name: memory_write
    description: Write or update structured memory records.
    status: disabled
    risk_level: restricted_action
    category: internal
    implementation: local_python
    notes: 长期记忆更新默认不开放，后续如接入真实执行仍需显式授权。

  - name: intent_router
    description: Configuration-driven intent routing.
    status: enabled
    risk_level: read_only
    category: internal
    implementation: local_python

  - name: pytest_runner
    description: Execute pytest test suites.
    status: enabled
    risk_level: execute_local_command
    category: testing
    implementation: local_python
    notes: 只允许通过受控 adapter 执行 `python -m pytest <repo-relative-target>`；不是 shell 通用执行器，不支持额外 pytest 参数。

  - name: allure_report
    description: Generate or serve Allure reports.
    status: planned
    risk_level: execute_local_command
    category: reporting
    implementation: planned_local_command

  - name: playwright_mcp
    description: Browser automation via Playwright MCP.
    status: planned
    risk_level: external_network
    category: browser
    implementation: planned_mcp
    notes: 保留为当前 dry-run 风险评估别名；正式 MCP 拆分优先看 playwright_browser。

  - name: playwright_browser
    description: Future Playwright MCP browser session for UI smoke and readonly inspection.
    status: planned
    risk_level: external_network
    category: browser
    implementation: planned_mcp
    notes: 第一阶段只评估 UI 冒烟、页面结构和只读检查，不做支付、下单、发券、删数据等高风险动作。

  - name: schemathesis
    description: API contract testing via schema-driven generation.
    status: planned
    risk_level: execute_local_command
    category: api_testing
    implementation: planned_local_command

  - name: keploy
    description: API test generation and mock tooling.
    status: planned
    risk_level: restricted_action
    category: api_testing
    implementation: planned_external_tool

  - name: github
    description: Repository operations through future GitHub integration.
    status: planned
    risk_level: external_network
    category: scm
    implementation: planned_mcp
    notes: 保留为当前 dry-run 风险评估别名；正式 MCP 拆分优先看 github_read / github_write。

  - name: github_read
    description: Read-only GitHub metadata and repository inspection through a future MCP tool.
    status: planned
    risk_level: external_network
    category: scm
    implementation: planned_mcp
    notes: 仅用于只读仓库信息、issue/PR 元数据和目录查看；接入前仍需 token 和确认。

  - name: github_write
    description: GitHub write operations through a future MCP tool.
    status: disabled
    risk_level: external_network
    category: scm
    implementation: planned_mcp
    notes: 创建 PR、评论、改状态等写操作默认不开放，必须人工确认。

  - name: filesystem
    description: File reading and writing integration.
    status: disabled
    risk_level: write_project_files
    category: storage
    implementation: planned_mcp
    notes: 保留为当前 dry-run 风险评估别名；正式 MCP 拆分优先看 filesystem_read / filesystem_write。

  - name: filesystem_read
    description: Read-only repository file access through the local adapter, replaceable by a future filesystem MCP tool.
    status: enabled
    risk_level: read_only
    category: storage
    implementation: local_python
    notes: 当前是本地白名单只读 adapter，不是 MCP 接入；只支持显式单文件读取，不读取真实业务敏感文件。

  - name: filesystem_mcp_read
    description: Filesystem MCP read-only access scoped to the repository root.
    status: enabled
    risk_level: read_only
    category: storage
    implementation: official_mcp
    notes: 当前已接入 runtime 的显式单文件只读入口 `--mcp-read-file`；仅允许通过 `FilesystemReadPolicy` 读取仓库根目录内低风险文本文件，不开放 `filesystem_write`。

  - name: filesystem_write
    description: Repository file write access through a future filesystem MCP tool.
    status: disabled
    risk_level: write_project_files
    category: storage
    implementation: planned_mcp
    notes: 写仓库文件默认不开放，必须人工确认。

  - name: shell
    description: Local shell command execution.
    status: disabled
    risk_level: execute_local_command
    category: execution
    implementation: planned_local_command

  - name: database_readonly
    description: Read-only database querying.
    status: unavailable
    risk_level: read_only
    category: database
    implementation: planned_mcp

  - name: redis_readonly
    description: Read-only Redis inspection.
    status: unavailable
    risk_level: read_only
    category: cache
    implementation: planned_mcp
