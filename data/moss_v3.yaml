title: "商户列表(服务合同)查询"
description: 商户列表(服务合同)查询
skip:
request:
  domain: oa
  method: GET
  url: /contract/merchant/my/list
  request_type: params
  data:
    { "pageSize": 10,"pageIndex": 1 }
  'headers':
    'User-Agent': 'Mozilla/5.0 (Linux; Android 11; PCHM10 Build/RKQ1.200903.002;
      wv) AppleWebKit/537.36 (KHTML, like Gecko) Version/4.0 Chrome/83.0.4103.106
      Mobile Safari/537.36 uni-app Html5Plus/1.0 (Immersed/32.0)'
extract:
  { "merchantId": "data.data[0].id" }
valid:
  [
    json: [ "code","==", 200 ],
    re: ["\"message\":\"(.+?)\"," ,"==","请求成功" ]
  ]
